[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Public keys that are expected to be present in the client bundle (avoid false positives in secret scanning)
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID,NEXT_PUBLIC_TURNSTILE_SITE_KEY"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"
